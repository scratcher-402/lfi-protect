proxy:
    listen: ":1545"
    server: "http://localhost:1544"
    max-req-body-size: 16000000
    check-url: true
    check-query: true
    check-filenames: true
    check-json: true
    check-file-leaks: true
    check-all-fields: true
    check-fields: [] # use when check-all-fields is false
    block-enabled: false # For tests only
    block-error-rate: 20
    block-interval: 300
files:
    paths:
        - .
    exclude:
        - example/files
        - example/templates
        - example/static
        - templates
        - static
logs:
    logs-path: logs
    console-log-level: 1
admin:
    enabled: true
    listen: ":6767"
    username: admin
    password: "$2a$12$rndT4q21Tj/HaWJrL5SGaOqX.WclLVs3FL6GoyMV1AqX48JhUcW66"